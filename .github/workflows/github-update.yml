---
name: GitHub Update
on:
  schedule:
    - cron: '0 11 * * *' # 11am UTC works out to be 3 or 4am Pacific time.
  workflow_dispatch:

# global permissions
permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          lfs: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.23'
          cache-dependency-path: |
            lottery/go.sum
            individuals/chicks/github/go.sum
            individuals/chicks/youtube/go.sum
            individuals/chicks/ccusage/go.sum

      - name: Setup R
        uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0
        with:
          r-version: '4.4'

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0

      - name: Setup just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: '1'

      - name: Install R packages
        run: "just install-r-deps"

      - name: Create update branch
        id: branch
        run: |
          BRANCH_NAME="automation/$(date -u +%Y-%m-%d)-github-update-${GITHUB_RUN_NUMBER}"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Run GitHub update
        env:
          GOTOOLCHAIN: auto
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just _github-update-ci

      - name: Check for changes
        id: changes
        run: |
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Select random emoji
        id: emoji
        run: |
          EMOJIS=("🚀" "📊" "🔄" "✨" "📈" "🤖" "📝" "🎯" "💡" "🔥" "🚗" "🚌" "🚲" "✈️" "🚂" "🚁" "🛸" "🚢" "🚕" "🚓" "🚒" "🚚" "🚛" "🚜" "⬛" "⬜" "🔴" "🟠" "🟡" "🟢" "🔵" "🟣" "⚫" "⚪" "🔶" "🔷" "🔺" "🔻" "💠" "⭐")
          RANDOM_EMOJI=${EMOJIS[$((RANDOM % ${#EMOJIS[@]}))]}
          echo "emoji=$RANDOM_EMOJI" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        env:
          RANDOM_EMOJI: ${{ steps.emoji.outputs.emoji }}
        run: |
          git config user.name 'Christopher Hicks'
          git config user.email 'chicks@chicks.net'
          git commit -m "$RANDOM_EMOJI [github] Update GitHub data ($(date -u +%Y-%m-%d))"

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
          RANDOM_EMOJI: ${{ steps.emoji.outputs.emoji }}
        run: |
          git push -u origin "$BRANCH_NAME"
          gh pr create \
            --title "$RANDOM_EMOJI [github] Update GitHub data ($(date -u +%Y-%m-%d))" \
            --body "## Summary

          Automated daily GitHub data update.

          ### Updated

          - Commit history (commits.db)
          - Contribution counts (contributions.db)
          - Comment history (comments.db)
          - Analysis visualizations

          ## Meta

          Triggered by scheduled workflow." \
            --base main
